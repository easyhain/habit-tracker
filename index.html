<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Student Report Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 5px; background: #fff; margin: 0; }
        .setup-box { background: #f0f0f0; padding: 10px; border: 1px solid #333; margin-bottom: 15px; border-radius: 5px; }
        .student-list-table { border-collapse: collapse; margin: 10px 0; background: white; width: 100%; max-width: 500px; }
        .student-list-table th, .student-list-table td { border: 1px solid #999; padding: 5px; font-size: 13px; }
        
        .btn { padding: 8px 15px; font-size: 13px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; margin: 5px 2px; }
        .btn-setup { background-color: #3498db; }
        .btn-gen { background-color: #2ecc71; }
        .btn-pdf { background-color: #e74c3c; }
        
        /* PDF Layout: Ek page par do result ke liye */
        #all-results-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            justify-content: center;
        }

        .result-wrapper { 
            width: 98%; /* Landscape mein do table ke liye perfect size */
            padding: 10px 0; 
            border-bottom: 1px dashed #aaa;
            page-break-inside: avoid; /* Table beech mein se na kate */
        }

        .table-container { width: 100%; overflow-x: auto; margin-bottom: 5px; }
        table { border-collapse: collapse; width: 100%; border: 1.5px solid #000; }
        th, td { border: 1px solid #000; padding: 2px 1px; text-align: center; font-size: 10px; font-weight: bold; }
        .subject-col { white-space: nowrap; text-align: left; padding-left: 3px; background: #f9f9f9; width: 1%; }
        .header-row { background: #d1d1d1; }
        .total-row { background: #e3f2fd; }
        .final-col { background: #fff3e0; width: 30px; }
        .student-info-header { text-align: left; margin-bottom: 3px; font-size: 12px; background: #eee; padding: 4px; border-left: 4px solid #333; }

        .no-print { display: block; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div id="setup-container" class="setup-box no-print">
    <h3>1. Student Setup</h3>
    <label>छात्रों की संख्या: </label>
    <input type="number" id="student-count" min="1" value="1" style="width: 50px;">
    <button class="btn btn-setup" onclick="createStudentList()">लिस्ट तैयार करें</button>

    <div id="list-area"></div>
    <div id="action-area" style="display:none; text-align: center; margin-top: 15px;">
        <button class="btn btn-gen" onclick="generateAllResults()">1. रिजल्ट देखें</button>
        <button id="pdf-btn" class="btn btn-pdf" style="display:none;" onclick="downloadPDF()">2. PDF डाउनलोड करें</button>
    </div>
</div>

<div id="pdf-content">
    <div id="all-results-container"></div>
</div>

<script>
window.addEventListener('beforeunload', function (e) {
    e.preventDefault();
    e.returnValue = 'डेटा मिट जाएगा!';
});

const months = ["jul", "aug", "oct", "nov", "jan", "feb"];
const subjects = ["हिन्दी", "अंग्रेजी", "सस्कृत/उर्दू", "गणित", "विज्ञान", "सामाजिक विज्ञान", "कला शिक्षा", "शारीरिक शिक्षा", "कार्यानुभव"];

function createStudentList() {
    const count = document.getElementById('student-count').value;
    let html = `<table class="student-list-table"><tr style="background:#ddd"><th>Roll</th><th>Name</th><th>Target %</th></tr>`;
    for(let i=1; i<=count; i++) {
        html += `<tr>
            <td><input type="number" id="roll-${i}" value="${i}" style="width:35px"></td>
            <td><input type="text" id="name-${i}" placeholder="नाम" style="width:140px"></td>
            <td><input type="number" id="tper-${i}" value="75" style="width:45px"></td>
        </tr>`;
    }
    html += `</table>`;
    document.getElementById('list-area').innerHTML = html;
    document.getElementById('action-area').style.display = 'block';
}

function getGrade(p) {
    if (p >= 91) return "A+"; if (p >= 81) return "A"; if (p >= 71) return "B+";
    if (p >= 61) return "B"; if (p >= 51) return "C+"; if (p >= 41) return "C";
    if (p >= 33) return "D"; return "E";
}

function generateAllResults() {
    const count = document.getElementById('student-count').value;
    const container = document.getElementById('all-results-container');
    container.innerHTML = ""; 

    for(let i=1; i<=count; i++) {
        const roll = document.getElementById(`roll-${i}`).value;
        const name = document.getElementById(`name-${i}`).value || "N/A";
        const target = parseFloat(document.getElementById(`tper-${i}`).value) || 75;

        let studentDiv = document.createElement('div');
        studentDiv.className = "result-wrapper";
        
        let header = `<div class="student-info-header"><b>Roll No:</b> ${roll} | <b>Name:</b> ${name}</div>`;
        
        let tableHtml = `<div class="table-container"><table>
            <tr class="header-row">
                <th rowspan="2" class="subject-col">विषय</th>
                ${months.map(m => `<th colspan="4">${getMonthHindi(m)}</th>`).join('')}
                <th class="final-col">कुल</th>
            </tr>
            <tr class="header-row">
                ${months.map(() => `<th>लि.</th><th>प्र.</th><th>योग</th><th>ग्र.</th>`).join('')}
                <th class="final-col">वार्षिक</th>
            </tr>`;

        let grandTotal = 0;
        let monthlyTotals = months.map(() => 0);

        subjects.forEach((sub, sIdx) => {
            tableHtml += `<tr><td class="subject-col">${sub}</td>`;
            let rowSum = 0;
            months.forEach((m, mIdx) => {
                let factor = (target/100) + (Math.random() * 0.4 - 0.2);
                factor = Math.max(0, Math.min(1, factor));
                let l = Math.round(20 * factor);
                let p = Math.round(5 * factor);
                let y = l + p;
                rowSum += y;
                monthlyTotals[mIdx] += y;
                tableHtml += `<td>${l}</td><td>${p}</td><td>${y}</td><td>${getGrade((y/25)*100)}</td>`;
            });
            tableHtml += `<td class="final-col">${rowSum}</td></tr>`;
            grandTotal += rowSum;
        });

        tableHtml += `<tr class="total-row"><td class="subject-col">कुल योग</td>`;
        monthlyTotals.forEach(mSum => tableHtml += `<td colspan="2">योग:</td><td colspan="2">${mSum}</td>`);
        tableHtml += `<td class="final-col">${grandTotal}</td></tr>`;

        tableHtml += `<tr class="total-row"><td class="subject-col">प्रतिशत</td>`;
        monthlyTotals.forEach(mSum => tableHtml += `<td colspan="4">${((mSum/225)*100).toFixed(0)}%</td>`);
        tableHtml += `<td class="final-col">${((grandTotal/1350)*100).toFixed(1)}%</td></tr>`;

        tableHtml += `</table></div>`;
        studentDiv.innerHTML = header + tableHtml;
        container.appendChild(studentDiv);
    }
    document.getElementById('pdf-btn').style.display = 'inline-block';
}

function downloadPDF() {
    const element = document.getElementById('pdf-content');
    const opt = {
        margin:       [0.3, 0.2],
        filename:     'Class_Report_2026.pdf',
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2 },
        jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' },
        pagebreak:    { mode: ['avoid-all'] } // Z जबरदस्ती पेज ब्रेक नहीं करेगा
    };
    html2pdf().set(opt).from(element).save();
}

function getMonthHindi(m) {
    const map = {jul:"जुलाई", aug:"अगस्त", oct:"अक्टूबर", nov:"नवम्बर", jan:"जनवरी", feb:"फरवरी"};
    return map[m];
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>EasyHain Habit Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        header {
          
            text-align: center;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f4f9; margin: 10px; }
        
        .wrapper { 
            background:  white; 
            padding: 15px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-block;
            min-width: 100%;
        }

        .controls { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px; 
            padding: 10px; 
            background: #fff; 
            border-radius: 8px;
        }

        .table-container {
            overflow-x: auto;
            width: 100%;
        }

        table { 
            border-collapse: collapse; 
            width: max-content; 
            table-layout: auto; 
            border: 2px solid #333;
        }

        th, td { 
            border: 1px solid #ccc; 
            padding: 8px 12px; 
            text-align: center; 
            white-space: nowrap; 
        }

        th { background: #eef2f3; font-size: 14px; }

        .col-habit { width: 200px; min-width: 200px; text-align: left; background: #f9f9f9; position: sticky; left: 0; z-index: 2; border-right: 2px solid #333; }
        .col-date { width: 45px; min-width: 45px; }
        .col-analysis { width: 280px; min-width: 280px; padding: 0; }

        .analysis-table { width: 100%; border-collapse: collapse; }
        .analysis-table td { padding: 5px; border: none; border-right: 1px solid #eee; }
        
        .progress-bg { width: 100px; background: #eee; height: 18px; border: 1px solid #999; }
        .progress-fill { height: 100%; background: #2d6a4f; transition: width 0.4s; }

        #chartWrapper { 
            width: calc(45.8* 45px + 62px); 
            height: 500px; 
            margin-top: 5px;
            margin-left: 240px; 
            background: #fff;
            border: 2px solid #ccc;
            border-top: none;
        }

        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-create { background: #007bff; color: white; }
        .btn-save { background: #28a745; color: white; }
        .btn-load { background: #ffc107; }
        /* Naya Button Style */
        .btn-clear { background: #d90429; color: white; } 
    </style>
</head>
<body>
<header>
    <a href="https://easyhain.github.io/homepage/" class="logo-link">
        <h1 class="site-name">easyhain</h1>
    </a>
</header>
<div class="wrapper">
    <div class="controls">
        <b style="font-size: 20px; color: #1a73e8;">EasyHain habit tracker</b>
        Habits: <input type="number" id="habitCount" value="5" style="width:50px; padding: 5px;">
        <button class="btn-create" onclick="initTracker()">Naya Banaye</button>
        <button class="btn-clear" onclick="clearAllTicks()">Clear All Ticks</button>
        <button class="btn-save" onclick="downloadData()">Save File</button>
        <button class="btn-load" onclick="document.getElementById('fileInput').click()">Load File</button>
        <input type="file" id="fileInput" style="display:none" onchange="uploadData(event)">
    </div>

    <div class="table-container">
        <table id="mainTable">
            <thead>
                <tr>
                    <th class="col-habit" rowspan="2">Habit Name</th>
                    <th colspan="31">Days of Month</th>
                    <th class="col-analysis" rowspan="2">Analysis (Goal: 31)</th>
                </tr>
                <tr id="dateRow"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div id="chartWrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<script>
    let habitsData = JSON.parse(localStorage.getItem('easyHain_free')) || [];
    let myChart = null;

    function initTracker() {
        const count = parseInt(document.getElementById('habitCount').value);
        if(habitsData.length !== count) {
            habitsData = Array.from({length: count}, (_, i) => ({
                name: habitsData[i]?.name || `Habit ${i+1}`,
                days: habitsData[i]?.days || Array(32).fill(false)
            }));
        }
        render();
    }

    // Saare ticks clear karne ka function
    function clearAllTicks() {
        if(confirm("Kya aap saare ticks hatana chahte hain?")) {
            habitsData.forEach(habit => {
                habit.days = Array(32).fill(false);
            });
            render();
        }
    }

    function render() {
        const dateRow = document.getElementById('dateRow');
        const body = document.getElementById('tableBody');

        let dHtml = '';
        for(let i=1; i<=31; i++) dHtml += `<th class="col-date">${i}</th>`;
        dateRow.innerHTML = dHtml;

        body.innerHTML = '';
        habitsData.forEach((habit, idx) => {
            const actual = habit.days.filter(x => x === true).length;
            const pct = (actual / 31) * 100;

            let tr = document.createElement('tr');
            let html = `<td class="col-habit"><input style="width:90%; border:none; font-size:14px; background:transparent;" value="${habit.name}" onchange="updateName(${idx}, this.value)"></td>`;
            
            for(let d=1; d<=31; d++) {
                html += `<td class="col-date"><input type="checkbox" style="width:18px; height:18px" ${habit.days[d] ? 'checked' : ''} onclick="toggle(${idx}, ${d})"></td>`;
            }

            html += `<td class="col-analysis">
                <table class="analysis-table">
                    <tr>
                        <td width="50px"><b>${actual}</b></td>
                        <td>
                            <div class="progress-bg"><div class="progress-fill" id="bar_${idx}" style="width:${pct}%"></div></div>
                        </td>
                    </tr>
                </table>
            </td>`;
            
            tr.innerHTML = html;
            body.appendChild(tr);
        });

        updateChart();
        save();
    }

    function toggle(hIdx, day) {
        habitsData[hIdx].days[day] = !habitsData[hIdx].days[day];
        render();
    }

    function updateName(idx, val) {
        habitsData[idx].name = val;
        save();
    }

    function updateChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const dailyData = Array(31).fill(0);
        for(let d=1; d<=31; d++) {
            habitsData.forEach(h => { if(h.days[d]) dailyData[d-1]++; });
        }

        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 31}, (_, i) => i + 1),
                datasets: [{
                    data: dailyData,
                    borderColor: '#1a73e8',
                    backgroundColor: 'rgba(26, 115, 232, 0.2)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { left: 10, right: 10 } },
                scales: { 
                    y: { beginAtZero: true, max: habitsData.length || 5, ticks: { stepSize: 1, display: false }, grid: { display: false } },
                    x: { grid: { display: true }, ticks: { font: { size: 10 } } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function save() { localStorage.setItem('easyHain_free', JSON.stringify(habitsData)); }

    function downloadData() {
        const blob = new Blob([JSON.stringify(habitsData)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'habit_tracker_backup.json';
        a.click();
    }

    function uploadData(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            habitsData = JSON.parse(e.target.result);
            document.getElementById('habitCount').value = habitsData.length;
            render();
        };
        reader.readAsText(event.target.files[0]);
    }

    window.onload = () => {
        if(habitsData.length > 0) document.getElementById('habitCount').value = habitsData.length;
        initTracker();
    };
</script>

</body>
</html>
